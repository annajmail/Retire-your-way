    .field{margin-bottom:16px}
    .field label{font-size:12px;color:#9ca3af;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px}
    .field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 14px;color:#f1f0ee;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;-webkit-appearance:none}

    .visa-check input{width:18px;height:18px;cursor:pointer;accent-color:#f97316}

    .type-opt{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:10px;cursor:pointer;text-align:center;font-size:13px;color:#9ca3af;transition:all .2s}

    .mod-del-btn{position:absolute;top:20px;right:20px;background:rgba(239,68,68,.15);border:none;color:#f87171;padding:6px 12px;border-radius:10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;z-index:2}

</head>

let S={data:loadData(),mod:null,mlbF:'All',modal:null,newModType:null};

function loadData(){
  try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):JSON.parse(JSON.stringify(DEF));}
  catch{return JSON.parse(JSON.stringify(DEF));}
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S.data));}catch{}}
function nid(a){return a.length?Math.max(...a.map(i=>i.id))+1:1;}
function bdg(st){const c=SC[st]||'#9ca3af';return`<span class="status-badge" style="background:${c}20;color:${c}">${st}</span>`;}
function grp(a,k){return a.reduce((r,i)=>{(r[i[k]]=r[i[k]]||[]).push(i);return r;},{});}
function vc(){return S.data.mlb.filter(s=>s.visited).length;}
function tim(i){return[i.month,i.year].filter(Boolean).join(' ');}
function enc(o){return JSON.stringify(o).replace(/\\/g,'\\\\').replace(/"/g,'&quot;');}
function sOpts(cur){return STATUSES.map(s=>`<option value="${s}"${cur===s?'selected':''}>${s}</option>`).join('');}
function mOpts(cur){return MONTHS.map(m=>`<option value="${m}"${cur===m?'selected':''}>${m||'No month'}</option>`).join('');}
function yOpts(cur){return YEARS.map(y=>`<option value="${y}"${cur===y?'selected':''}>${y||'No year'}</option>`).join('');}
function g(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function gc(id){const e=document.getElementById(id);return e?e.checked:false;}

// ===================== MODAL =====================
function openModal(type,item){S.modal={type,item:item?JSON.parse(JSON.stringify(item)):null};render();}
function closeModal(){S.modal=null;render();}

function modalHTML(){
  const{type,item}=S.modal;
  const isE=!!item;

  // Confirm delete
  if(type==='confirm'){
    return`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">Delete?</div>
        <p style="color:#9ca3af;font-size:14px;margin-bottom:24px">This can't be undone.</p>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-save" style="background:#ef4444" onclick="confirmDel()">Delete</button>
        </div>
      </div>
    </div>`;
  }

  // Stay
  if(type==='stay'){
    const regOpts=S.data.travel.regions.map(r=>`<option value="${r.name}"${item&&item.region===r.name?'selected':''}>${r.icon} ${r.name}</option>`).join('');
    return modal(`${isE?'Edit':'Add'} Stay`,`
      <div class="field"><label>Destination</label><input id="fd" value="${item?item.destination:''}" placeholder="e.g. Lisbon, Portugal"/></div>

window.saveM=function(type,id){
  const isE=id!=="'null'"&&id!==null;
  if(type==='stay'){
    const o={destination:g('fd'),region:g('fr'),month:g('fm'),year:g('fy'),status:g('fs'),visa:gc('fv'),notes:g('fn')};
    if(!o.destination)return;
    if(isE)S.data.travel.stays=S.data.travel.stays.map(s=>s.id==id?{...s,...o}:s);
    else S.data.travel.stays.push({id:nid(S.data.travel.stays),...o});
  }else if(type==='roadtrip'){
    const o={name:g('fd'),region:g('fr'),month:g('fm'),year:g('fy'),status:g('fs'),interests:g('fi').split(',').map(s=>s.trim()).filter(Boolean),notes:g('fn')};
    if(!o.name)return;
    if(isE)S.data.travel.roadTrips=S.data.travel.roadTrips.map(r=>r.id==id?{...r,...o}:r);
    else S.data.travel.roadTrips.push({id:nid(S.data.travel.roadTrips),...o});
  }else if(type==='region'){
    const o={name:g('fd'),icon:g('fi')||'🌍',description:g('fn')};
    if(!o.name)return;
    if(isE)S.data.travel.regions=S.data.travel.regions.map(r=>r.id==id?{...r,...o}:r);
    else S.data.travel.regions.push({id:nid(S.data.travel.regions),...o});
  }else if(type==='homelife'){
    const o={name:g('fd'),category:g('fc'),timeframe:g('ft'),status:g('fs')};
    if(!o.name)return;
    if(isE)S.data.homeLife.items=S.data.homeLife.items.map(h=>h.id==id?{...h,...o}:h);
    else S.data.homeLife.items.push({id:nid(S.data.homeLife.items),...o});
  }else if(type==='homecat'){
    const o={name:g('fd'),icon:g('fi')||'📌',description:g('fn')};
    if(!o.name)return;
    if(isE)S.data.homeLife.categories=S.data.homeLife.categories.map(c=>c.id==id?{...c,...o}:c);
    else S.data.homeLife.categories.push({id:nid(S.data.homeLife.categories),...o});
  }else if(type==='hobby'){
    const o={name:g('fd'),category:g('fc'),status:g('fs')};
    if(!o.name)return;
    if(isE)S.data.hobbies.items=S.data.hobbies.items.map(h=>h.id==id?{...h,...o}:h);
    else S.data.hobbies.items.push({id:nid(S.data.hobbies.items),...o});
  }else if(type==='hobbycat'){
    const o={name:g('fd'),icon:g('fi')||'📌',description:g('fn')};
    if(!o.name)return;
    if(isE)S.data.hobbies.categories=S.data.hobbies.categories.map(c=>c.id==id?{...c,...o}:c);
    else S.data.hobbies.categories.push({id:nid(S.data.hobbies.categories),...o});
  }
  save();closeModal();
};

window.setModType=function(t){S.newModType=t;render();};

window.saveNewModule=function(){
  const name=g('fd'),icon=g('fi')||'📋',desc=g('fn'),itemType=S.newModType||'custom-simple';
  if(!name)return;
  S.data.customModules.push({id:Date.now(),name,icon,description:desc,itemType,categories:[],items:[]});
  S.newModType=null;
  save();closeModal();
};

window.saveCustomItem=function(modId,itemId){
  const mod=S.data.customModules.find(m=>m.id==modId);
  if(!mod)return;
  const isE=itemId!=="'null'"&&itemId!==null;
  const o={name:g('fd'),category:g('fc')||'',timeframe:g('ft')||'',description:g('fn')||'',status:g('fs')};
  if(!o.name)return;
  if(isE)mod.items=mod.items.map(i=>i.id==itemId?{...i,...o}:i);
  else mod.items.push({id:nid(mod.items),...o});
  save();closeModal();
};

window.saveCustomCat=function(modId,catId){
  const mod=S.data.customModules.find(m=>m.id==modId);
  if(!mod)return;
  const isE=catId!=="'null'"&&catId!==null;
  const o={name:g('fd'),icon:g('fi')||'📌',description:g('fn')||''};
  if(!o.name)return;
  if(isE)mod.categories=mod.categories.map(c=>c.id==catId?{...c,...o}:c);
  else mod.categories.push({id:nid(mod.categories),...o});
  save();closeModal();
};

window.delItem=function(type,id,modId){
  S.modal={type:'confirm',deleteType:type,deleteId:id,deleteModId:modId};render();
};

window.confirmDel=function(){
  const{deleteType:type,deleteId:id,deleteModId:modId}=S.modal;
  if(type==='stay')S.data.travel.stays=S.data.travel.stays.filter(s=>s.id!=id);
  else if(type==='roadtrip')S.data.travel.roadTrips=S.data.travel.roadTrips.filter(r=>r.id!=id);
  else if(type==='region')S.data.travel.regions=S.data.travel.regions.filter(r=>r.id!=id);
  else if(type==='homelife')S.data.homeLife.items=S.data.homeLife.items.filter(h=>h.id!=id);
  else if(type==='homecat'){
    S.data.homeLife.categories=S.data.homeLife.categories.filter(c=>c.id!=id);
    S.data.homeLife.items=S.data.homeLife.items.filter(i=>i.category!==S.modal.deleteName);
  }
  else if(type==='hobby')S.data.hobbies.items=S.data.hobbies.items.filter(h=>h.id!=id);
  else if(type==='hobbycat'){
    S.data.hobbies.categories=S.data.hobbies.categories.filter(c=>c.id!=id);
    S.data.hobbies.items=S.data.hobbies.items.filter(i=>i.category!==S.modal.deleteName);
  }
  else if(type==='customitem'){const m=S.data.customModules.find(m=>m.id==modId);if(m)m.items=m.items.filter(i=>i.id!=id);}
  else if(type==='customcat'){const m=S.data.customModules.find(m=>m.id==modId);if(m){const cn=S.modal.deleteName;m.categories=m.categories.filter(c=>c.id!=id);m.items=m.items.filter(i=>i.category!==cn);}}
  else if(type==='module'){S.data.customModules=S.data.customModules.filter(m=>m.id!=id);S.mod=null;}
  save();closeModal();
};

function renderCategoryModule(data,itemType,editType,catType,addItemFn,addCatFn,delItemType,delCatType){
  const grouped=grp(data.items,'category');
  const cats=data.categories.map(cat=>{
    const items=grouped[cat.name]||[];
    const itemsHTML=items.map(item=>{
      let details='';
      if(itemType==='home')details=`<div class="act-time">${item.timeframe||''}</div>`;
      return`<div class="act-card">
        <div class="act-row"><div><div class="act-name">${item.name}</div>${details}</div>${bdg(item.status)}</div>
        <div class="card-actions">
          <button class="btn-edit" onclick='openModal("${editType}",${enc(item)})'>Edit</button>
          <button class="btn-del" onclick="delItem('${delItemType}',${item.id})">Delete</button>
        </div>
      </div>`;}).join('');
    return`<div class="cat-group">
      <div class="cat-head">
        <div class="cat-head-left"><span>${cat.icon}</span>${cat.name}</div>
        <div style="display:flex;gap:6px">
          <button class="btn-edit" onclick='openModal("${catType}",${enc(cat)})'>Edit</button>
          <button class="btn-del-cat" onclick="delItem('${delCatType}',${cat.id},null,'${cat.name}')">✕</button>
        </div>
      </div>
      ${cat.description?`<div style="font-size:12px;color:#6b7280;margin-bottom:10px">${cat.description}</div>`:''}
      ${itemsHTML}
    </div>`;}).join('');
  return cats+
    `<button class="add-btn" onclick="${addItemFn}">＋ Add Item</button>
     <button class="add-cat-btn" onclick="${addCatFn}">＋ Add Category</button>`;
}

}

function renderHobbies(){
  return renderCategoryModule(S.data.hobbies,'hobby','hobby','hobbycat',
    "openModal('hobby',null)","openModal('hobbycat',null)",'hobby','hobbycat');
}

function renderCustomModule(mod){
  if(mod.itemType==='custom-simple'){
    const items=mod.items.map(item=>`<div class="act-card">
      <div class="act-row"><div><div class="act-name">${item.name}</div>${item.description?`<div class="act-desc">${item.description}</div>`:''}</div>${bdg(item.status)}</div>
      <div class="card-actions">
        <button class="btn-edit" onclick='S.modal.modId=${mod.id};openModal("customitem",${enc(item)})'>Edit</button>
        <button class="btn-del" onclick="delItem('customitem',${item.id},${mod.id})">Delete</button>
      </div>
    </div>`).join('');
    return items+`<button class="add-btn" onclick="S.modal={type:'customitem',item:null,modId:${mod.id}};render()">＋ Add Item</button>`;
  }
  const grouped=grp(mod.items,'category');
  const cats=mod.categories.map(cat=>{
    const items=grouped[cat.name]||[];
    const itemsHTML=items.map(item=>`<div class="act-card">
      <div class="act-row"><div>
        <div class="act-name">${item.name}</div>
        ${item.timeframe?`<div class="act-time">${item.timeframe}</div>`:''}
      </div>${bdg(item.status)}</div>
      <div class="card-actions">
        <button class="btn-edit" onclick='S.modal={type:"customitem",item:${enc(item)},modId:${mod.id}};render()'>Edit</button>
        <button class="btn-del" onclick="delItem('customitem',${item.id},${mod.id})">Delete</button>
      </div>
    </div>`).join('');
    return`<div class="cat-group">
      <div class="cat-head">
        <div class="cat-head-left"><span>${cat.icon||'📌'}</span>${cat.name}</div>
        <div style="display:flex;gap:6px">
          <button class="btn-edit" onclick='S.modal={type:"customcat",item:${enc(cat)},modId:${mod.id}};render()'>Edit</button>
          <button class="btn-del-cat" onclick="delItem('customcat',${cat.id},${mod.id},'${cat.name}')">✕</button>
        </div>
      </div>
      ${itemsHTML}
    </div>`;}).join('');
  return cats+
    `<button class="add-btn" onclick="S.modal={type:'customitem',item:null,modId:${mod.id}};render()">＋ Add Item</button>
     <button class="add-cat-btn" onclick="S.modal={type:'customcat',item:null,modId:${mod.id}};render()">＋ Add Category</button>`;
}

function renderDetail(){
  let content='',headClass='travel',icon='✈️',label='Travel',showDelMod=false,modId=null;
  if(S.mod==='travel'){content=renderTravel();headClass='travel';icon='✈️';label='Travel';}
  else if(S.mod==='mlb'){content=renderMLB();headClass='mlb';icon='⚾';label='MLB Tour';}
  else if(S.mod==='homeLife'){content=renderHomeLife();headClass='homeLife';icon='🏡';label='Home Life';}
  else if(S.mod==='hobbies'){content=renderHobbies();headClass='hobbies';icon='🎨';label='Hobbies';}
  else if(S.mod&&S.mod.startsWith('custom-')){
    modId=parseInt(S.mod.replace('custom-',''));
    const mod=S.data.customModules.find(m=>m.id===modId);
    if(mod){content=renderCustomModule(mod);headClass='custom';icon=mod.icon;label=mod.name;showDelMod=true;}
  }
  const delBtn=showDelMod?`<button class="mod-del-btn" onclick="delItem('module',${modId})">Delete Module</button>`:'';
  return`<div class="detail">
    <div class="detail-head ${headClass}" style="position:relative">
      <button class="back-btn" onclick="closeMod()">← Back</button>
      ${delBtn}
      <div style="font-size:36px">${icon}</div>
      <div class="detail-title">${label}</div>
    </div>
    <div class="detail-body">${content}</div>
  </div>${S.modal?modalHTML():''}`;
}

function render(){document.getElementById('app').innerHTML=S.mod?renderDetail():renderHome();}

window.openMod=function(m){S.mod=m;S.modal=null;render();window.scrollTo(0,0);};
window.closeMod=function(){S.mod=null;S.modal=null;render();window.scrollTo(0,0);};
window.togS=function(id){S.data.mlb=S.data.mlb.map(s=>s.id===id?{...s,visited:!s.visited}:s);save();render();};
window.setF=function(f){S.mlbF=f;render();};
window.openModal=openModal;
window.closeModal=closeModal;
window.delItem=function(type,id,modId,name){
  S.modal={type:'confirm',deleteType:type,deleteId:id,deleteModId:modId,deleteName:name};render();
};

render();
</script>
</body>
</html>
